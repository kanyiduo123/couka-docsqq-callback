<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>МЪС¶ОДөөКЪИЁ»Шөч</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial;max-width:720px;margin:40px auto;padding:0 16px}
    code,pre{background:#f5f5f5;padding:8px;border-radius:6px;display:block;overflow:auto}
    button{padding:8px 12px;margin-top:8px}
    .row{margin:14px 0}
    .err{color:#b00020}
  </style>
</head>
<body>
  <h2>МЪС¶ОДөөКЪИЁ»Шөч</h2>
  <div class="row">°СПВГжөД <b>code</b> ёҙЦЖ»ШіМРтјҙҝЙЎЈ</div>

  <div id="errorBox" class="row err" style="display:none"></div>

  <div class="row">
    <div><b>code</b>Јә</div>
    <pre id="code">(ҝХ)</pre>
    <button id="copyBtn" disabled>ёҙЦЖ code</button>
  </div>

  <div class="row">
    <div><b>state</b>Јә</div>
    <pre id="state">(ҝХ)</pre>
  </div>

  <script>
    const qs = new URLSearchParams(location.search);
    const code = qs.get("code") || "";
    const state = qs.get("state") || "";
    const error = qs.get("error") || "";
    const errorDesc = qs.get("error_description") || "";

    const codeEl = document.getElementById("code");
    const stateEl = document.getElementById("state");
    const copyBtn = document.getElementById("copyBtn");
    const errorBox = document.getElementById("errorBox");

    codeEl.textContent = code || "(ҝХ)";
    stateEl.textContent = state || "(ҝХ)";

    if (error) {
      errorBox.style.display = "block";
      errorBox.textContent = `КЪИЁК§°ЬЈә${error}${errorDesc ? " - " + errorDesc : ""}`;
    }

    if (code) {
      copyBtn.disabled = false;
      copyBtn.addEventListener("click", async () => {
        await navigator.clipboard.writeText(code);
        copyBtn.textContent = "ТСёҙЦЖ";
        setTimeout(()=>copyBtn.textContent="ёҙЦЖ code", 1200);
      });
    }
  </script>
</body>
</html>
